name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm ci

      - name: Check for credentials in source
        run: |
          if grep -rE '(password|wachtwoord|secret|token)\s*[:=]\s*["\x27][^"\x27]{8,}' \
            --include='*.js' --include='*.json' --exclude-dir=node_modules \
            --exclude=package-lock.json .; then
            echo "::error::Possible credentials found in source files"
            exit 1
          fi

      - name: Validate .env.example has no real values
        run: |
          if grep -E '^CB_PASSWORD=.{5,}' .env.example; then
            echo "::error::Real password found in .env.example"
            exit 1
          fi

      - name: Syntax check
        run: node --check download.js
